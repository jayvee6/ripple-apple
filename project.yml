name: Ripple
options:
  bundleIdPrefix: dev.studiojoe
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "9"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    DEVELOPMENT_TEAM: ATGGQ68RUK

packages:
  RippleCore:
    path: Packages/RippleCore

targets:
  Ripple:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Ripple
        excludes:
          - "Info.plist"
    dependencies:
      - package: RippleCore
      # Watch app embedded into the iOS app bundle for paired distribution
      # via TestFlight / App Store. xcodegen places it at the correct
      # $(CONTENTS_FOLDER_PATH)/Watch/ destination automatically when
      # embedding a watchOS application target.
      - target: RippleWatch
        embed: true
        codeSign: true
    info:
      path: Ripple/Info.plist
      properties:
        CFBundleDisplayName: Ripple
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "Ripple does not read from Health. This permission is required by Apple when the HealthKit entitlement is enabled."
        NSHealthUpdateUsageDescription: "Ripple logs each completed breathing session as Mindful Minutes in Health."
        UILaunchScreen:
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: Ripple/Ripple.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.studiojoe.ripple
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Ripple/Ripple.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES

  RippleWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: RippleWatch
        excludes:
          - "Info.plist"
    dependencies:
      - package: RippleCore
    info:
      path: RippleWatch/Info.plist
      properties:
        CFBundleDisplayName: Ripple
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "Ripple does not read from Health. This permission is required by Apple when the HealthKit entitlement is enabled."
        NSHealthUpdateUsageDescription: "Ripple logs each completed breathing session as Mindful Minutes in Health."
        WKApplication: true
        WKCompanionAppBundleIdentifier: dev.studiojoe.ripple
        WKRunsIndependentlyOfCompanionApp: true
        UIUserInterfaceStyle: Dark
    entitlements:
      path: RippleWatch/RippleWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.studiojoe.ripple.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: RippleWatch/RippleWatch.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

  RippleCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Packages/RippleCore/Tests/RippleCoreTests
    dependencies:
      - package: RippleCore
